<div class="lab-table">
  <div class="beaker-container">
    <canvas id="beakerCanvas" width="300" height="600"></canvas>
    <div id="overlay">按 【空白鍵】 開始實驗</div>
  </div>
  
  <div class="dashboard">
    <div class="stat-box">
      <h3>下一個試劑</h3>
      <div id="next-preview">--</div>
    </div>
    <div class="stat-box">
      <h3>實驗狀態</h3>
      <div id="status">待機中</div>
    </div>
    <div class="stat-box">
      <h3>分數</h3>
      <div id="score">0</div>
    </div>
    <div class="controls">
      <p>⬅️ ➡️ 控制方向</p>
      <p>空白鍵：開始</p>
      <p>Shift：暫停 / 繼續</p>
    </div>
  </div>
</div>
